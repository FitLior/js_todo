<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="styles2.css">
  <title>Todo App</title>

</head>
<body>

<header>
  <h1>TODO</h1>
  <p>Saved locally on your device</p>
</header>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="200" />
    <button id="addBtn" aria-label="Add todo">+</button>
  </div>
  <div class="date-row">
    <span>Start date</span>
    <input type="date" id="startDateInput" />
  </div>
  <div class="date-row">
    <span>End date</span>
    <input type="date" id="endDateInput" />
  </div>
</div>

<div class="footer-bar">
  <span id="countLabel">0 tasks</span>
  <button class="clear-btn" id="clearBtn">Clear completed</button>
</div>

<!-- Dynamic lists are injected here -->
<div class="lists-container" id="listsContainer"></div>

<button class="add-list-btn" id="addListBtn">+ Add list</button>

<script>
  // ── Element refs ──────────────────────────────────────────────
  const input          = document.getElementById('todoInput');
  const startDateInput = document.getElementById('startDateInput');
  const endDateInput   = document.getElementById('endDateInput');
  const addBtn         = document.getElementById('addBtn');
  const countLabel     = document.getElementById('countLabel');
  const clearBtn       = document.getElementById('clearBtn');
  const listsContainer = document.getElementById('listsContainer');
  const addListBtn     = document.getElementById('addListBtn');

  // ── State ─────────────────────────────────────────────────────
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');

  // lists array: each entry is { index, filter }
  // index is a unique number used to find the <ul data-list-index="N"> in the DOM
  let lists = [];
  // counter that only ever goes up — guarantees unique indexes even after deletions
  let listCount = 0;

  // ── Persistence ───────────────────────────────────────────────
  function save() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  // ── Date filter helpers ───────────────────────────────────────
  function isThisWeek(startDateStr, endDateStr) {
    if (!startDateStr) return false;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diffToSun = today.getDay();
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() - diffToSun);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    const start = new Date(startDateStr + 'T00:00:00');
    const end = endDateStr ? new Date(endDateStr + 'T00:00:00') : start;
    return start <= weekEnd && end >= weekStart;
  }

  function isNextWeek(startDateStr, endDateStr) {
    if (!startDateStr) return false;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const thisWeekStart = new Date(today);
    thisWeekStart.setDate(today.getDate() - today.getDay());
    const nextWeekStart = new Date(thisWeekStart);
    nextWeekStart.setDate(thisWeekStart.getDate() + 7);
    const nextWeekEnd = new Date(nextWeekStart);
    nextWeekEnd.setDate(nextWeekStart.getDate() + 6);
    const start = new Date(startDateStr + 'T00:00:00');
    const end = endDateStr ? new Date(endDateStr + 'T00:00:00') : start;
    return start <= nextWeekEnd && end >= nextWeekStart;
  }

  function isThisMonth(startDateStr, endDateStr) {
    if (!startDateStr) return false;
    const today = new Date();
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    const monthEnd   = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    const start = new Date(startDateStr + 'T00:00:00');
    const end = endDateStr ? new Date(endDateStr + 'T00:00:00') : start;
    return start <= monthEnd && end >= monthStart;
  }

  // ── Filter logic (reusable, takes a filter string) ────────────
  function applyFilter(filterValue) {
    return todos.filter(t => {
      if (filterValue === 'active')    return !t.done;
      if (filterValue === 'completed') return t.done;
      if (filterValue === 'week')      return isThisWeek(t.startDate, t.endDate);
      if (filterValue === 'nextweek')  return isNextWeek(t.startDate, t.endDate);
      if (filterValue === 'month')     return isThisMonth(t.startDate, t.endDate);
      return true; // 'all'
    });
  }

  // ── List creation ─────────────────────────────────────────────
  // Creates a full list section in the DOM and registers it in the lists array.
  // filterValue is what this list shows by default (defaults to 'all').
  function createList(filterValue = 'all') {
    // grab the next unique index and increment the counter
    const index = listCount++;

    // register this list in our lists array
    lists.push({ index, filter: filterValue });

    // build the section wrapper
    const section = document.createElement('div');
    section.className = 'list-section';
    // stamp the section with the index so we can find it later
    section.dataset.listSection = index;

    section.innerHTML = `
      <div class="list-header">
        <div class="list-header-left">
          <span>List #${index}</span>
          <select class="list-filter-select" onchange="changeListFilter(${index}, this.value)">
            <option value="all"       ${filterValue === 'all'       ? 'selected' : ''}>All</option>
            <option value="active"    ${filterValue === 'active'    ? 'selected' : ''}>Active</option>
            <option value="completed" ${filterValue === 'completed' ? 'selected' : ''}>Completed</option>
            <option value="week"      ${filterValue === 'week'      ? 'selected' : ''}>This Week</option>
            <option value="nextweek"  ${filterValue === 'nextweek'  ? 'selected' : ''}>Next Week</option>
            <option value="month"     ${filterValue === 'month'     ? 'selected' : ''}>This Month</option>
          </select>
        </div>
        ${index > 0 ? `<button class="delete-list-btn" onclick="deleteList(${index})">✕ remove</button>` : ''}
      </div>
      <div class="list" data-list-index="${index}"></div>
    `;

    listsContainer.appendChild(section);

    // render this list immediately
    renderList(index);
  }

  // ── Change a list's filter ────────────────────────────────────
  // Called by the <select> inside each list header.
  function changeListFilter(index, newFilter) {
    // find the entry in our lists array and update its filter
    const entry = lists.find(l => l.index === index);
    if (entry) entry.filter = newFilter;
    renderList(index);
  }

  // ── Delete a list ─────────────────────────────────────────────
  function deleteList(index) {
    // remove from DOM: find the section by its data-list-section attribute
    const section = document.querySelector(`[data-list-section="${index}"]`);
    if (section) section.remove();
    // remove from lists array
    lists = lists.filter(l => l.index !== index);
  }

  // ── Render a single list ──────────────────────────────────────
  // Finds the <div data-list-index="N"> and fills it with filtered task HTML.
  function renderList(index) {
    // THIS is where the dynamic selector replaces getElementById
    const listEl = document.querySelector(`[data-list-index="${index}"]`);
    if (!listEl) return; // safety: list may have been deleted

    // get this list's current filter from the lists array
    const entry = lists.find(l => l.index === index);
    if (!entry) return;

    const filtered = applyFilter(entry.filter);

    listEl.innerHTML = filtered.length === 0
      ? emptyMessage(entry.filter)
      : filtered.map(todoHTML).join('');
  }

  // ── Render all lists ──────────────────────────────────────────
  // Called after any state change (add, toggle, delete, clear).
  function renderAll() {
    // update the task counter (global, not per-list)
    const active = todos.filter(t => !t.done).length;
    countLabel.textContent = `${active} task${active !== 1 ? 's' : ''} left`;

    // re-render every registered list
    lists.forEach(l => renderList(l.index));
  }

  // ── Task actions ──────────────────────────────────────────────
  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    const startDate = startDateInput.value || null;
    const endDate   = endDateInput.value   || null;
    todos.unshift({ id: Date.now(), text, startDate, endDate, done: false });
    input.value = '';
    startDateInput.value = '';
    endDateInput.value   = '';
    save();
    renderAll();
  }

  function toggleTodo(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.done = !t.done;
    save();
    renderAll();
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    renderAll();
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.done);
    save();
    renderAll();
  }

  // ── Date editing ──────────────────────────────────────────────
  function startEditStartDate(id) {
    const el = document.getElementById('start-date-edit-' + id);
    if (!el) return;
    el.style.display = 'block';
    el.focus();
  }

  function startEditEndDate(id) {
    const el = document.getElementById('end-date-edit-' + id);
    if (!el) return;
    el.style.display = 'block';
    el.focus();
  }

  function cancelEditStartDate(id) {
    const el = document.getElementById('start-date-edit-' + id);
    if (el) el.style.display = 'none';
  }

  function cancelEditEndDate(id) {
    const el = document.getElementById('end-date-edit-' + id);
    if (el) el.style.display = 'none';
  }

  function updateStartDate(id, value) {
    const t = todos.find(t => t.id === id);
    if (t) t.startDate = value || null;
    save();
    renderAll();
  }

  function updateEndDate(id, value) {
    const t = todos.find(t => t.id === id);
    if (t) t.endDate = value || null;
    save();
    renderAll();
  }

  function clearStartDate(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.startDate = null;
    save();
    renderAll();
  }

  function clearEndDate(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.endDate = null;
    save();
    renderAll();
  }

  // ── HTML helpers ──────────────────────────────────────────────
  function emptyMessage(filterValue) {
    const messages = {
      completed: 'No completed tasks',
      active:    'Nothing to do!',
      week:      'No tasks this week',
      nextweek:  'No tasks next week',
      month:     'No tasks this month'
    };
    return `<p class="empty">${messages[filterValue] || 'Add your first task'}</p>`;
  }

  function todoHTML(t) {
    return `
      <div class="todo-item ${t.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleTodo(${t.id})" aria-label="Toggle">✓</button>
        <div class="todo-body">
          <span class="todo-text">${escapeHtml(t.text)}</span>

          ${t.startDate
            ? `<span class="todo-date" onclick="startEditStartDate(${t.id})">Start Date: 📅 ${formatDate(t.startDate)}
               <button class="clear-date-btn" onclick="clearStartDate(${t.id})">X</button></span>`
            : `<button class="no-date-btn" onclick="startEditStartDate(${t.id})">+ add start date</button>`
          }
          <input class="inline-date-input" id="start-date-edit-${t.id}" type="date"
            style="display:none" value="${t.startDate || ''}"
            onchange="updateStartDate(${t.id}, this.value)"
            onblur="cancelEditStartDate(${t.id})" />

          ${t.endDate
            ? `<span class="todo-date" onclick="startEditEndDate(${t.id})">Due Date: 📅 ${formatDate(t.endDate)}
               <button class="clear-date-btn" onclick="clearEndDate(${t.id})">X</button></span>`
            : `<button class="no-date-btn" onclick="startEditEndDate(${t.id})">+ add end date</button>`
          }
          <input class="inline-date-input" id="end-date-edit-${t.id}" type="date"
            style="display:none" value="${t.endDate || ''}"
            onchange="updateEndDate(${t.id}, this.value)"
            onblur="cancelEditEndDate(${t.id})" />
        </div>
        <button class="del-btn" onclick="deleteTodo(${t.id})" aria-label="Delete">✕</button>
      </div>
    `;
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Event listeners ───────────────────────────────────────────
  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
  clearBtn.addEventListener('click', clearCompleted);
  addListBtn.addEventListener('click', () => createList('all'));

  // ── Boot ──────────────────────────────────────────────────────
  // Create the first list (index 0) — this is your original default list
  createList('all');

  // ── Service worker ────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'todo-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
      });
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  }
</script>
</body>
</html>
